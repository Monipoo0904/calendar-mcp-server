<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MyVillage Workspace</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ── Sidebar ── -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-brand">
            <div class="sidebar-logo">
              <img src="/MyVillageProject_icon_bluelg.png" alt="MVP logo" />
            </div>
            <span class="sidebar-name">MyVillage</span>
          </div>

          <nav class="sidebar-nav" aria-label="Main navigation">
            <button class="nav-item is-active" data-tab="chat" aria-current="page">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Chat</span>
            </button>
            <button class="nav-item" data-tab="documents">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Documents</span>
            </button>
          </nav>
        </div>

        <div class="sidebar-footer">
          <div id="connectedUserName" class="connected-user" hidden></div>
          <button id="signinGoogle" class="google-signin-btn" aria-label="Sign in with Google">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Sign in with Google</span>
          </button>
          <button id="clearBtnTop" class="sidebar-clear-btn" aria-label="Clear chat">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <polyline points="3,6 5,6 21,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Clear chat</span>
          </button>
        </div>
      </aside>

      <!-- ── Main workspace ── -->
      <main class="workspace">

        <!-- Chat tab -->
        <section class="tab-panel is-active" id="tab-chat">
          <div class="workspace-topbar">
            <div class="workspace-heading">
              <h1>Hey there! <span class="wave">👋</span></h1>
              <p>In the village, everyone has something to teach, earn and build.</p>
            </div>
            <div id="spinner" class="spinner" aria-hidden="true" hidden></div>
          </div>

          <!-- Quick-action cards: shown only when chat is empty -->
          <div id="quickActions" class="quick-actions">
            <button class="quick-card" data-action="student-plans">
              <span class="qc-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="qc-label">Create Student Plans</span>
            </button>
            <button class="quick-card" data-action="export">
              <span class="qc-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="qc-label">Export By Person</span>
            </button>
            <button class="quick-card" data-action="connect-calendars">
              <span class="qc-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="qc-label">Connect Calendars</span>
            </button>
            <button class="quick-card" data-action="recurrence">
              <span class="qc-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M17 1l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M3 11V9a4 4 0 0 1 4-4h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M7 23l-4-4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="qc-label">Recurring Cadence</span>
            </button>
            <button class="quick-card" data-action="knowledge-base">
              <span class="qc-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                  <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="qc-label">Ask Knowledge Base</span>
            </button>
          </div>

          <div id="messages" class="messages" role="log" aria-live="polite"></div>

          <form id="form" class="composer" aria-label="Chat composer">
            <textarea id="input" rows="1" placeholder="Let's build something…" aria-label="Type a message" autocomplete="off"></textarea>
            <button id="sendBtn" type="submit" aria-label="Send message">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </form>
        </section>

        <!-- Documents tab -->
        <section class="tab-panel" id="tab-documents">
          <div class="workspace-topbar">
            <div class="workspace-heading">
              <h1>Documents</h1>
              <p>Upload files to expand the knowledge base.</p>
            </div>
          </div>

          <div class="upload-zone" id="uploadZone" tabindex="0" role="button" aria-label="Upload files — drag and drop or click to browse">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="17,8 12,3 7,8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <p class="upload-prompt">Drag &amp; drop files here, or <span class="upload-link">click to browse</span></p>
            <p class="upload-hint">Supports .txt · .md · .pdf · .json</p>
            <input type="file" id="fileInput" class="file-input-hidden" accept=".txt,.md,.pdf,.json" multiple aria-hidden="true" tabindex="-1" />
          </div>

          <div id="uploadedList" class="uploaded-list" aria-live="polite"></div>
        </section>

      </main>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
